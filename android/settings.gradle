include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'

// Use local capacitor-android copy to avoid OneDrive file snapshot issues
def capacitorAndroidPath = '../capacitor-local'
if (file(capacitorAndroidPath).exists()) {
    include ':capacitor-android'
    project(':capacitor-android').projectDir = new File(capacitorAndroidPath)
}